<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반려동물 소개</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --card: #171a21;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #6ea8fe;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #5f6368;
      --accent: #3b6fe0;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    padding: 48px 24px;
  }
  header {
    text-align: center;
    max-width: 640px;
    margin: 0 auto 40px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    line-height: 1.6;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 20px 24px 24px;
  }
  .card-body h2 {
    margin: 0 0 6px;
    font-size: 1.3rem;
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .card-body p {
    margin: 0;
    color: var(--muted);
    line-height: 1.6;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
  <header>
    <h1>🐾 우리 반려동물 소개</h1>
    <p>사랑스러운 우리 아이들을 소개합니다.</p>
  </header>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?auto=format&fit=crop&w=800&q=80" alt="골든 리트리버 몽이">
      <div class="card-body">
        <span class="badge">강아지</span>
        <h2>몽이</h2>
        <p>골든 리트리버, 3살. 활발하고 애교가 많아서 산책 시간을 제일 좋아해요.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&w=800&q=80" alt="러시안 블루 나비">
      <div class="card-body">
        <span class="badge">고양이</span>
        <h2>나비</h2>
        <p>러시안 블루, 2살. 조용하고 도도하지만 가끔 무릎 위로 올라오는 츤데레예요.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?auto=format&fit=crop&w=800&q=80" alt="하얀 토끼 토실이">
      <div class="card-body">
        <span class="badge">토끼</span>
        <h2>토실이</h2>
        <p>홀란드 롭 토끼, 1살. 당근을 세상에서 제일 좋아하고 겁이 많아요.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1552728089-57bdde30beb3?auto=format&fit=crop&w=800&q=80" alt="초록 앵무새 짹짹이">
      <div class="card-body">
        <span class="badge">앵무새</span>
        <h2>짹짹이</h2>
        <p>왕관앵무, 4살. 말을 곧잘 따라하고 노래를 틀어주면 신나게 춤을 춰요.</p>
      </div>
    </div>
  </div>
</body>
</html>
