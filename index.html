<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>abc</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --card: #171a21;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #6ea8fe;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #5f6368;
      --accent: #3b6fe0;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  h1 {
    margin: 0 0 12px;
    font-size: 2rem;
    letter-spacing: -0.02em;
  }
  p {
    margin: 0 0 24px;
    color: var(--muted);
    line-height: 1.6;
  }
  .badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>abc</h1>
    <p>GitHub Pages로 배포된 간단한 소개 페이지입니다.</p>
    <span class="badge">Hello, World!</span>
  </div>
</body>
</html>
